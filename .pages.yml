# Pages CMS configuration for zaciszeturawa.pl
# Schema source of truth: src/content/config.ts (Zod)
# This file mirrors that schema for the CMS editing UI.
# When adding/removing fields in config.ts, update this file too.
#
# Media policy:
#   - public/assets/current/hotel/  — baseline images, protected (no CMS write)
#   - public/assets/uploads/        — new CMS uploads go here

media:
  input: public/assets/uploads
  output: /assets/uploads

content:
  - name: site-settings
    label: Site settings
    path: src/data/site.json
    type: file
    fields:
      - { name: siteName, label: Site name, type: string }
      - { name: phone, label: Phone number, type: string }
      - { name: email, label: Email address, type: string }
      - { name: mapsUrl, label: Google Maps URL, type: string }
      - { name: facebookUrl, label: Facebook URL, type: string }
      - { name: instagramUrl, label: Instagram URL, type: string }

  - name: navigation
    label: Navigation
    path: src/data/navigation.json
    type: file
    fields:
      - name: primary
        label: Primary navigation
        type: list
        fields:
          - { name: label, label: Label, type: string }
          - { name: path, label: Path, type: string }

  - name: pl-pages
    label: Polish pages
    path: src/content/pl/pages
    type: collection
    view:
      fields: [title, pageType, status]
    fields:
      # Locked fields — do not expose for free editing to avoid SEO breakage
      - { name: locale, label: Locale, type: string, hidden: true }
      - { name: translationKey, label: Translation key, type: string }
      - { name: canonicalPath, label: Canonical path, type: string }
      - { name: sourceUrl, label: Source URL, type: string, hidden: true }
      - name: pageType
        label: Page type
        type: select
        options:
          values:
            - home
            - rooms
            - room-detail
            - packages
            - package-detail
            - spa
            - restaurant
            - conferences
            - gallery
            - contact
            - booking
            - vouchers
            - attractions
            - reviews
            - legal
            - jobs
            - other
      - { name: title, label: Title, type: string }
      - { name: seoTitle, label: SEO title, type: string }
      - { name: description, label: Meta description, type: string }
      - name: status
        label: Status
        type: select
        options:
          values:
            - captured
            - deferred
            - redirect-pending
      - { name: heroImage, label: Hero image, type: image }
      - name: gallery
        label: Gallery images
        type: list
        fields:
          - { name: image, label: Image, type: image }
      - name: cta
        label: Call to action
        type: object
        fields:
          - { name: label, label: Button label, type: string }
          - name: bookingMode
            label: Booking mode
            type: select
            options:
              values: [base, offers, room, package]
      - name: guestSage
        label: GuestSage IDs
        type: object
        fields:
          - { name: featuredRoomTypeId, label: Room type ID, type: number }
          - { name: featuredRatePlanId, label: Rate plan ID, type: number }
      - name: body
        label: Content
        type: rich-text
